<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dm1w4w1o8/image/upload/v1774885944/favicon-32x32_recxvs.png">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:ital,wdth,wght@0,75..100,100..900;1,75..100,100..900&display=swap" rel="stylesheet">
  <title>Contacto Sara Espejo</title>
</head>
<body>
  <div id="header"></div>

  <main>
    <section class="contact-section">
      <h1>Contacto</h1>
      <p class="contact-intro">
        Si quieres ponerte en contacto conmigo, puedes enviarme un mensaje a través de este formulario.
      </p>

      <div class="contact-container">
        <form class="contact-form">

          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input 
              type="text" 
              id="nombre" 
              name="nombre" 
              placeholder="Tu nombre"
              required
            >
          </div>
        
          <div class="form-group">
            <label for="email">Email</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              placeholder="tu@email.com"
              required
            >
          </div>
        
          <div class="form-group">
            <label for="asunto">Asunto</label>
            <input 
              type="text" 
              id="asunto" 
              name="asunto" 
              placeholder="Motivo del mensaje"
              required
            >
          </div>
        
          <div class="form-group">
            <label for="mensaje">Mensaje</label>
            <textarea 
              id="mensaje" 
              name="mensaje" 
              placeholder="Escribe tu mensaje aquí..."
              required
            ></textarea>
          </div>
        
          <button type="submit" class="btn-submit">Enviar</button>
        
        </form>
      </div>
    </section>
  </main>

  <div id="footer"></div>
  <script type="module" src="./js/main.js"></script>

</body>
</html>
